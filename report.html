<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your report — Contrax</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23F6F2E9'/%3E%3Cpath d='M16 50 52 14 74 36' stroke='%231C2B24' stroke-width='11' fill='none'/%3E%3Crect x='28' y='18' width='9' height='13' fill='%231C2B24'/%3E%3Cg fill='%231C2B24' transform='rotate(-45 52 50)'%3E%3Crect x='40' y='38' width='11' height='11'/%3E%3Crect x='54' y='38' width='11' height='11'/%3E%3Crect x='40' y='52' width='11' height='11'/%3E%3Crect x='54' y='52' width='11' height='11'/%3E%3C/g%3E%3Cpath d='M28 62 52 86 90 44' stroke='%23BE4B33' stroke-width='12' fill='none'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.report-page{max-width:680px;margin:0 auto}
.pending{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:44px;text-align:center}
.spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--green);border-radius:50%;margin:0 auto 18px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.rp-card{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:30px;margin-bottom:22px}
.rp-verdict{display:flex;gap:10px;align-items:center;font-weight:600;padding:13px 16px;border-radius:9px;margin-bottom:20px}
.rp-verdict.fair{background:#E4EFE0;color:#2C5B27}
.rp-verdict.negotiate,.rp-verdict.scan{background:var(--flag-soft);color:#8A3421}
.rp-verdict.caution{background:#F6DAD3;color:#8A2413}
.rp-flag{padding:12px 0;border-bottom:1px dashed var(--line-soft)}
.rp-flag b{font-size:.95rem}
.rp-flag.danger b::before{content:"\26A0  ";color:var(--flag)}
.rp-flag.warning b::before{content:"\26A0  ";color:var(--amber)}
.rp-flag p{font-size:.9rem;color:var(--ink-soft);margin-top:3px}
.rp-src{font-size:.78rem;color:var(--ink-faint)}
.rp-msg{background:var(--paper);border-radius:10px;padding:16px;font-size:.93rem;color:var(--ink-soft);margin:12px 0 14px}
.rp-locked{position:relative;overflow:hidden}
.rp-blur{filter:blur(6px);user-select:none;pointer-events:none;opacity:.75}
.rp-lockover{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;padding:24px;background:rgba(255,253,247,.55)}
.rp-lockover p{font-size:.95rem;color:var(--ink-soft);max-width:30em}
.rp-lockover b{color:var(--ink)}
h3{margin-bottom:8px}
</style>
</head>
<body>
<header class="site-head">
  <div class="wrap head-row">
    <a class="brand" href="index.html" aria-label="Contrax home"><svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true"><path class="m-roof" d="M16 50 52 14 74 36"/><rect class="m-ink" x="28" y="18" width="9" height="13"/><g class="m-win" transform="rotate(-45 52 50)"><rect x="40" y="38" width="11" height="11"/><rect x="54" y="38" width="11" height="11"/><rect x="40" y="52" width="11" height="11"/><rect x="54" y="52" width="11" height="11"/></g><path class="m-check" d="M28 62 52 86 90 44"/></svg><span>Contrax</span></a>
  </div>
</header>
<main class="section">
  <div class="wrap report-page" id="root">
    <div class="pending">
      <div class="spinner" aria-hidden="true"></div>
      <h3 id="pendTitle">Scanning your quote — free</h3>
      <p id="pendBody" style="color:var(--ink-soft)">Reading the document and checking the fine print for red flags. About 30 seconds.</p>
    </div>
  </div>
</main>
<script>
(function () {
  var id = new URLSearchParams(location.search).get("id");
  var root = document.getElementById("root");
  if (!id) { root.innerHTML = "<p>Missing report id.</p>"; return; }
  function esc(s) { var d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }
  function money(n) { return n == null ? "—" : "$" + Number(n).toLocaleString(); }
  function flagsHtml(flags) {
    return flags.map(function (f) {
      return '<div class="rp-flag ' + esc(f.severity) + '"><b>' + esc(f.title) + '</b><p>' + esc(f.detail) + '</p></div>';
    }).join("");
  }
  function setPending(title, body) {
    var t = document.getElementById("pendTitle"), b = document.getElementById("pendBody");
    if (t) { t.textContent = title; b.textContent = body; }
    else {
      root.innerHTML = '<div class="pending"><div class="spinner" aria-hidden="true"></div><h3 id="pendTitle">' + esc(title) + '</h3><p id="pendBody" style="color:var(--ink-soft)">' + esc(body) + "</p></div>";
    }
  }

  /* ---- free scan view: flags free, the rest locked ---- */
  function renderScan(scan) {
    var n = scan.flags.length;
    var headline = n === 0 ? "No red flags in the fine print" : n + " red flag" + (n > 1 ? "s" : "") + " found — free scan";
    root.innerHTML =
      '<p class="eyebrow">Free scan results</p>' +
      '<div class="rp-card"><div class="rp-verdict ' + (n === 0 ? "fair" : "scan") + '">' + esc(headline) + "</div>" +
        flagsHtml(scan.flags) +
        '<p class="rp-src" style="margin-top:14px">Found by document analysis — free, every time.</p></div>' +
      '<div class="rp-card rp-locked"><div class="rp-blur">' +
        "<h3>Fair price for your area</h3><p>Their quote: $2,000 · Local range: $650–$1,100 based on nearby jobs and published prices…</p>" +
        "<h3 style=\"margin-top:18px\">Contractor background</h3><p>License status, complaint history, and reviews from public records…</p>" +
        "<h3 style=\"margin-top:18px\">Your counter-offer</h3><p>Hi — thanks for the quote. Comparable repairs in this area run…</p>" +
      "</div>" +
      '<div class="rp-lockover">' +
        "<p><b>Unlock the full report.</b> The fair price for your zip code, the contractor's license &amp; complaint check, the exact reply to send — and a negotiation coach until it's settled.</p>" +
        '<button class="btn btn-solid" id="unlockBtn" type="button">Unlock full report — free during launch</button>' +
        '<p class="rp-src">Free while we grow. Sponsors never touch verdicts.</p>' +
      "</div></div>" +
      '<p class="rp-src">Contrax provides pricing information, not legal or professional advice.</p>';
    document.getElementById("unlockBtn").addEventListener("click", async function () {
      this.disabled = true; this.textContent = "One moment…";
      try {
        var res = await fetch("/api/reports/" + encodeURIComponent(id) + "/unlock", { method: "POST" });
        var data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Something went wrong");
        if (data.checkout_url) { window.location = data.checkout_url; return; }
        setPending("Building your full report", "Checking the contractor's records and local prices. Usually a minute or two.");
        setTimeout(poll, 2500);
      } catch (ex) {
        this.disabled = false; this.textContent = "Unlock full report — free during launch";
        alert(ex.message);
      }
    });
  }

  /* ---- full report view ---- */
  function render(r) {
    var findings = r.research_findings.map(function (f) {
      return '<div class="rp-flag"><p>' + esc(f.finding) + ' <span class="rp-src">— ' + esc(f.source) + '</span></p></div>';
    }).join("");
    var qs = r.questions_to_ask.map(function (q) { return "<li>" + esc(q) + "</li>"; }).join("");
    root.innerHTML =
      '<p class="eyebrow">Contrax report</p>' +
      '<div class="rp-card">' +
        '<div class="rp-verdict ' + esc(r.verdict) + '">' + esc(r.headline) + "</div>" +
        "<p><b>Their quote:</b> " + money(r.quote_total) + " &nbsp;·&nbsp; <b>Local range:</b> " +
        money(r.local_range_low) + "–" + money(r.local_range_high) +
        ' <span class="rp-src">(confidence: ' + esc(r.price_confidence) + ")</span></p>" +
        '<p class="rp-src" style="margin-top:6px">' + esc(r.price_basis) + "</p></div>" +
      '<div class="rp-card"><h3>Red flags</h3>' + (flagsHtml(r.red_flags) || "<p>None found.</p>") + "</div>" +
      '<div class="rp-card"><h3>What we found researching the contractor</h3>' + (findings || "<p>Nothing verifiable found.</p>") + "</div>" +
      '<div class="rp-card"><h3>Your counter-offer, ready to send</h3>' +
        '<div class="rp-msg">' + esc(r.counter_offer_message) + "</div>" +
        '<button class="btn btn-small" id="copyBtn" type="button">Copy message</button></div>' +
      '<div class="rp-card"><h3>Questions to ask before signing</h3><ul style="padding-left:20px;color:var(--ink-soft)">' + qs + "</ul></div>" +
      '<div class="rp-card"><h3>Contractor pushed back?</h3>' +
        '<p style="font-size:.9rem;color:var(--ink-soft);margin-bottom:10px">Paste their reply and Contrax plans your next move.</p>' +
        '<textarea id="fuInput" placeholder="He said $1,800 is the lowest he can go…" style="width:100%;min-height:84px;font-family:inherit;font-size:.92rem;padding:11px 13px;border:1.5px solid var(--line);border-radius:9px;background:var(--paper);color:var(--ink);resize:vertical;outline:none"></textarea>' +
        '<button class="btn btn-small" id="fuBtn" type="button" style="margin-top:10px">Get my next move</button>' +
        '<div id="fuOut"></div></div>' +
      '<p class="rp-src">Contrax provides pricing information, not legal or professional advice.</p>';
    document.getElementById("copyBtn").addEventListener("click", function () {
      navigator.clipboard.writeText(r.counter_offer_message);
      this.textContent = "Copied";
    });
    var fuBtn = document.getElementById("fuBtn"), fuOut = document.getElementById("fuOut");
    fuBtn.addEventListener("click", async function () {
      var reply = document.getElementById("fuInput").value.trim();
      if (reply.length < 3) return;
      fuBtn.disabled = true; fuBtn.textContent = "Thinking…";
      try {
        var res = await fetch("/api/reports/" + encodeURIComponent(id) + "/followup", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ reply: reply })
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Something went wrong");
        fuOut.innerHTML =
          '<p style="font-size:.92rem;color:var(--ink-soft);margin:16px 0 10px"><b style="color:var(--ink)">The play:</b> ' + esc(data.advice) + "</p>" +
          '<div class="rp-msg" style="margin-top:0">' + esc(data.message) + "</div>" +
          '<button class="btn btn-small" id="fuCopy" type="button">Copy message</button>';
        document.getElementById("fuCopy").addEventListener("click", function () {
          navigator.clipboard.writeText(data.message);
          this.textContent = "Copied";
        });
      } catch (ex) {
        fuOut.innerHTML = '<p style="color:#BE4B33;font-size:.9rem;margin-top:12px">' + esc(ex.message) + "</p>";
      }
      fuBtn.disabled = false; fuBtn.textContent = "Get my next move";
    });
  }

  async function poll() {
    try {
      var res = await fetch("/api/reports/" + encodeURIComponent(id));
      var data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Report not found");
      if (data.status === "complete") { render(data.report); return; }
      if (data.status === "scanned") { renderScan(data.scan); return; }
      if (data.status === "failed") {
        root.innerHTML = '<div class="pending"><h3>Analysis failed</h3><p style="color:var(--ink-soft)">' + esc(data.error) + "</p></div>";
        return;
      }
      if (data.status === "processing") {
        setPending("Building your full report", "Checking the contractor's records and local prices. Usually a minute or two.");
      }
      setTimeout(poll, 3000);
    } catch (ex) {
      root.innerHTML = '<div class="pending"><h3>Hmm</h3><p style="color:var(--ink-soft)">' + esc(ex.message) + "</p></div>";
    }
  }
  poll();
})();
</script>
</body>
</html>
